<!-- Generated by GitHub Copilot -->
<nav aria-label="Pagination" class="flex items-center justify-center gap-1">
  <button
    type="button"
    (click)="goTo(currentPage() - 1)"
    [disabled]="!canGoPrev()"
    class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 disabled:cursor-not-allowed disabled:opacity-50"
    aria-label="Previous page"
  >
    Previous
  </button>

  <ul class="flex items-center gap-1" role="list">
    @for (entry of pages(); track $index) {
      <li>
        @if (isNumber(entry)) {
          @if (entry === currentPage()) {
            <button
              type="button"
              aria-current="page"
              [attr.aria-label]="'Page ' + entry + ', current page'"
              class="min-w-[2.25rem] rounded-md border border-indigo-500 bg-indigo-50 px-3 py-1.5 text-sm font-semibold text-indigo-700"
            >
              {{ entry }}
            </button>
          } @else {
            <button
              type="button"
              (click)="goTo(entry)"
              [attr.aria-label]="'Go to page ' + entry"
              class="min-w-[2.25rem] rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400"
            >
              {{ entry }}
            </button>
          }
        } @else {
          <span class="px-1 text-slate-400" aria-hidden="true">…</span>
        }
      </li>
    }
  </ul>

  <button
    type="button"
    (click)="goTo(currentPage() + 1)"
    [disabled]="!canGoNext()"
    class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 disabled:cursor-not-allowed disabled:opacity-50"
    aria-label="Next page"
  >
    Next
  </button>
</nav>
