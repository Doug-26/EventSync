<!-- Generated by GitHub Copilot -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 px-4 transition-opacity duration-150"
  (click)="onBackdropClick($event)"
  (keydown)="onKeydown($event)"
>
  <div
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="'confirm-dialog-title'"
    [attr.aria-describedby]="'confirm-dialog-message'"
    class="w-full max-w-md transform rounded-xl bg-white p-6 shadow-xl transition-transform duration-150"
  >
    <h2 id="confirm-dialog-title" class="text-lg font-semibold text-slate-900">
      {{ title() }}
    </h2>
    <p id="confirm-dialog-message" class="mt-2 text-sm text-slate-600">
      {{ message() }}
    </p>

    <div class="mt-6 flex justify-end gap-3">
      <button
        #cancelBtn
        type="button"
        (click)="onCancel()"
        class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
      >
        {{ cancelText() }}
      </button>
      <button
        #confirmBtn
        type="button"
        (click)="onConfirm()"
        [class]="'rounded-md px-4 py-2 text-sm font-semibold text-white shadow-sm focus:outline-none focus-visible:ring-2 ' + confirmClass()"
      >
        {{ confirmText() }}
      </button>
    </div>
  </div>
</div>
