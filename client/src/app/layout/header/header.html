<!-- Generated by GitHub Copilot -->
<header class="bg-white border-b border-slate-200 shadow-sm">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 sm:px-6">
    <a
      routerLink="/"
      class="flex items-center gap-2 text-lg font-semibold text-indigo-700 hover:text-indigo-800"
      aria-label="EventSync home"
    >
      <span aria-hidden="true" class="text-2xl">📅</span>
      <span>EventSync</span>
    </a>

    <nav aria-label="Primary">
      <ul class="flex items-center gap-4 text-sm font-medium text-slate-700">
        @if (isLoading()) {
          <li>
            <span
              class="inline-block h-8 w-24 animate-pulse rounded bg-slate-100"
              role="status"
              aria-label="Loading account"
            ></span>
          </li>
        } @else if (!isAuthenticated()) {
          <li>
            <a
              routerLink="/login"
              class="rounded-md px-3 py-1.5 text-indigo-700 ring-1 ring-indigo-200 hover:bg-indigo-50"
            >
              Sign in
            </a>
          </li>
        } @else {
          <li class="relative">
            <button
              #menuButton
              type="button"
              class="flex items-center gap-2 rounded-full p-1 pr-3 text-slate-700 ring-1 ring-slate-200 hover:bg-slate-50"
              aria-haspopup="menu"
              [attr.aria-expanded]="isMenuOpen()"
              aria-controls="account-menu"
              (click)="toggleMenu(); $event.stopPropagation()"
            >
              @if (avatarUrl()) {
                <img
                  [src]="avatarUrl()!"
                  width="32"
                  height="32"
                  [alt]="'Avatar of ' + displayName()"
                  referrerpolicy="no-referrer"
                  class="h-8 w-8 rounded-full object-cover"
                />
              } @else {
                <span
                  aria-hidden="true"
                  class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-600 text-sm font-semibold text-white"
                >
                  {{ avatarInitial() }}
                </span>
              }
              <span class="hidden max-w-[10rem] truncate text-sm font-medium sm:inline">
                {{ displayName() }}
              </span>
              <span aria-hidden="true" class="text-xs">▾</span>
            </button>

            @if (isMenuOpen()) {
              <ul
                id="account-menu"
                role="menu"
                class="absolute right-0 mt-2 w-48 origin-top-right rounded-md border border-slate-200 bg-white py-1 shadow-lg focus:outline-none"
              >
                <li role="none">
                  <a
                    role="menuitem"
                    routerLink="/dashboard"
                    (click)="closeMenu()"
                    class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50"
                  >
                    Dashboard
                  </a>
                </li>
                <li role="none">
                  <button
                    type="button"
                    role="menuitem"
                    (click)="onSignOut()"
                    class="block w-full px-4 py-2 text-left text-sm text-slate-700 hover:bg-slate-50"
                  >
                    Sign out
                  </button>
                </li>
              </ul>
            }
          </li>
        }
      </ul>
    </nav>
  </div>
</header>
